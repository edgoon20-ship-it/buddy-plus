<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>버디버디플러스</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1A1A1A;
      --accent-light: #F0F0F0;
      --bg: #F5F5F5;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --subtext: #888888;
      --border: #E8E8E8;
      --danger: #FF3B30;
      --danger-bg: #FFF0EF;
      --tag-active-bg: #E8F5E9;
      --tag-active-color: #2E7D32;
      --tag-past-bg: #F5F5F5;
      --tag-past-color: #999;
      --radius: 18px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 110px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      padding: 52px 20px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header h1 span { color: var(--subtext); font-weight: 400; }
    .header-sub { font-size: 12px; color: var(--subtext); margin-top: 3px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 88px;
      z-index: 49;
    }
    .tab {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--accent-light);
      color: var(--subtext);
      transition: all 0.15s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    /* ── EVENT LIST ── */
    .events-list {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── EVENT CARD ── */
    .event-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .status-tag.active { background: var(--tag-active-bg); color: var(--tag-active-color); }
    .status-tag.past { background: var(--tag-past-bg); color: var(--tag-past-color); }
    .status-tag.full { background: #FFF3E0; color: #E65100; }

    .event-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .meta-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .meta-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #444; }
    .meta-icon { font-size: 14px; flex-shrink: 0; margin-top: 0px; }
    .meta-text { line-height: 1.4; }

    .event-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.55;
      margin-bottom: 14px;
      background: #FAFAFA;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    /* Capacity */
    .capacity-section { margin-bottom: 14px; }
    .capacity-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 6px;
    }
    .capacity-label strong { color: var(--text); font-weight: 700; }
    .capacity-bar {
      background: #EBEBEB;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .capacity-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .capacity-fill.full { background: #BDBDBD; }

    /* Attendees */
    .attendees-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--subtext);
      cursor: pointer;
      margin-bottom: 10px;
      user-select: none;
    }
    .attendees-toggle .pill {
      background: var(--accent-light);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }
    .attendees-wrap {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .attendees-wrap.open { display: flex; }
    .attendee-chip {
      background: var(--accent-light);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }

    /* Card actions */
    .card-actions { display: flex; gap: 8px; }
    .btn-join {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: opacity 0.15s;
    }
    .btn-join:disabled {
      background: #DEDEDE;
      color: #999;
      cursor: not-allowed;
    }
    .btn-join:not(:disabled):active { opacity: 0.75; }
    .btn-del {
      background: var(--danger-bg);
      color: var(--danger);
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-del:active { opacity: 0.6; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      left: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 17px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.22);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.2px;
      transition: opacity 0.15s;
    }
    .fab:active { opacity: 0.8; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 14px 20px 40px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes slideUp {
      from { transform: translateY(110%); }
      to   { transform: translateY(0); }
    }
    .handle {
      width: 38px; height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 0 auto 22px;
    }
    .sheet-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    /* Form elements */
    .fg { margin-bottom: 16px; }
    .fg label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }
    .fg input, .fg select, .fg textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
    .fg textarea { resize: none; line-height: 1.5; }
    .fg-row { display: flex; gap: 10px; }
    .fg-row .fg { flex: 1; }

    .btn-main {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: -0.2px;
    }
    .btn-cancel {
      width: 100%;
      background: var(--accent-light);
      color: var(--subtext);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-danger {
      width: 100%;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    /* Code box */
    .code-box {
      background: #FAFAFA;
      border: 2px dashed #DDD;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      margin: 16px 0;
    }
    .code-box .code-val {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--accent);
    }
    .code-box .code-hint { font-size: 12px; color: var(--subtext); margin-top: 6px; line-height: 1.5; }
    .code-box .code-warning { font-size: 12px; color: var(--danger); margin-top: 6px; font-weight: 600; }

    /* Notice banner */
    .notice {
      background: #FFFBEC;
      border: 1px solid #FFE082;
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 12px;
      color: #5D4037;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 70px 20px;
      color: var(--subtext);
    }
    .empty-emoji { font-size: 52px; margin-bottom: 14px; }
    .empty-msg { font-size: 15px; line-height: 1.6; }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 16px;
      margin-bottom: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #222;
      color: #fff;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div>
        <h1>버디버디플러스 <span>🤝</span></h1>
        <p class="header-sub">원우회 소모임 플랫폼</p>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('upcoming')">예정된 모임</button>
    <button class="tab" onclick="switchTab('past')">지난 모임</button>
  </div>

  <!-- EVENT LIST -->
  <div class="events-list" id="eventsList">
    <div class="event-card">
      <div class="skeleton" style="width:60px;height:20px;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:70%;height:22px;"></div>
      <div class="skeleton" style="width:50%;height:14px;margin-top:12px;"></div>
      <div class="skeleton" style="width:40%;height:14px;"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openAdd()">✏️ 새 모임 발제하기</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>


  <!-- ─── MODAL: 이벤트 추가 ─── -->
  <div class="overlay" id="addOverlay" onclick="overlayClose(event,'addOverlay')">
    <div class="sheet">
      <div class="handle"></div>
      <p class="sheet-title">새 모임 발제 ✏️</p>

      <div class="fg">
        <label>모임 이름 *</label>
        <input type="text" id="fTitle" placeholder="예: 용마산 등산, 마포 카페 탐방" maxlength="60">
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>날짜 *</label>
          <input type="date" id="fDate">
        </div>
        <div class="fg">
          <label>시간</label>
          <input type="time" id="fTime">
        </div>
      </div>

      <div class="fg">
        <label>장소</label>
        <input type="text" id="fLocation" placeholder="예: 7호선 용마산역 1번 출구">
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>발제자 이름 *</label>
          <input type="text" id="fProposer" placeholder="본인 이름">
        </div>
        <div class="fg">
          <label>최대 인원</label>
          <input type="number" id="fMaxCap" placeholder="제한 없음" min="1" max="200">
        </div>
      </div>

      <div class="fg">
        <label>한 줄 소개 (선택)</label>
        <textarea id="fDesc" rows="2" placeholder="모임에 대한 간단한 소개를 적어주세요"></textarea>
      </div>

      <button class="btn-main" onclick="submitAdd()">발제하기 🚀</button>
      <button class="btn-cancel" onclick="closeOverlay('addOverlay')">취소</button>
    </div>
  </div>


  <!-- ─── MODAL: 삭제 코드 안내 ─── -->
  <div class="overlay" id="codeOverlay">
    <div class="sheet">
      <div class="handle"></div>
      <p class="sheet-title">모임 등록 완료! ✅</p>
      <p style="font-size:14px;color:#555;line-height:1.6;margin-bottom:4px;">
        아래 코드로 나중에 이 모임을 삭제할 수 있어요.<br>
        지금 바로 저장해두세요!
      </p>
      <div class="code-box">
        <div class="code-val" id="codeDisplay">------</div>
        <p class="code-hint">발제자 전용 삭제 코드</p>
        <p class="code-warning">⚠️ 창을 닫으면 다시 볼 수 없어요</p>
      </div>
      <button class="btn-main" onclick="closeOverlay('codeOverlay')">저장했어요, 확인!</button>
    </div>
  </div>


  <!-- ─── MODAL: 참가 신청 ─── -->
  <div class="overlay" id="joinOverlay" onclick="overlayClose(event,'joinOverlay')">
    <div class="sheet">
      <div class="handle"></div>
      <p class="sheet-title" id="joinTitle">참가 신청 ✋</p>

      <div class="fg">
        <label>이름 *</label>
        <input type="text" id="jName" placeholder="이름을 입력해주세요">
      </div>

      <div class="fg">
        <label>학년 *</label>
        <select id="jYear">
          <option value="">학년 선택</option>
          <option value="1학년">1학년</option>
          <option value="2학년">2학년</option>
          <option value="3학년">3학년</option>
        </select>
      </div>

      <button class="btn-main" onclick="submitJoin()">신청하기!</button>
      <button class="btn-cancel" onclick="closeOverlay('joinOverlay')">취소</button>
    </div>
  </div>


  <!-- ─── MODAL: 삭제 확인 ─── -->
  <div class="overlay" id="delOverlay" onclick="overlayClose(event,'delOverlay')">
    <div class="sheet">
      <div class="handle"></div>
      <p class="sheet-title">모임 삭제 🗑️</p>
      <div class="notice">
        삭제 코드를 입력해주세요.<br>
        발제 시 받은 <strong>6자리 코드</strong> 또는 <strong>관리자 비밀번호</strong>로 삭제할 수 있어요.
      </div>

      <div class="fg">
        <label>삭제 코드</label>
        <input type="text" id="delCode" placeholder="코드 입력"
          style="text-align:center;letter-spacing:5px;font-size:20px;font-weight:700;text-transform:uppercase;">
      </div>

      <button class="btn-danger" onclick="submitDelete()">삭제하기</button>
      <button class="btn-cancel" onclick="closeOverlay('delOverlay')">취소</button>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════
       ⚙️  CONFIGURATION — 여기를 수정하세요!
       ═══════════════════════════════════════════ -->
  <script>
    /* ─── 1. Firebase 설정 ───────────────────────────────────────────
       Firebase Console(https://console.firebase.google.com)에서
       프로젝트 생성 후 아래 값을 교체하세요.
       ─────────────────────────────────────────────────────────────── */
    const firebaseConfig = {
    apiKey: "AIzaSyDpfSrrSRmi_e1sk6GOzzBuF6QMmxLNdnA",
    authDomain: "buddy-plus-36a5c.firebaseapp.com",
    projectId: "buddy-plus-36a5c",
    storageBucket: "buddy-plus-36a5c.firebasestorage.app",
    messagingSenderId: "828311468069",
    appId: "1:828311468069:web:f78f1ea1a8a7361480a7cc",
    measurementId: "G-XXPN008XG3"
    };

    /* ─── 2. 관리자 비밀번호 ──────────────────────────────────────────
       원하는 비밀번호로 변경하세요. 관리자끼리 공유해주세요.
       ─────────────────────────────────────────────────────────────── */
    const ADMIN_PW = "bbplus2025";

    /* ────────────────────────────────────────────────────────────────
       아래 코드는 수정하지 않아도 됩니다.
       ──────────────────────────────────────────────────────────────── */
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();

    let currentTab  = 'upcoming';
    let allEvents   = [];
    let activeEvent = null;

    function genCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }

    function esc(s) {
      if (!s) return '';
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function fmtDate(dateStr, timeStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const dayNames = ['일','월','화','수','목','금','토'];
      const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      let s = `${y}년 ${monthNames[m-1]} ${d}일 (${dayNames[date.getDay()]})`;
      if (timeStr) {
        const [hh, mm] = timeStr.split(':');
        const h = parseInt(hh);
        s += ` · ${h < 12 ? '오전' : '오후'} ${h % 12 || 12}:${mm}`;
      }
      return s;
    }

    function isPast(dateStr, timeStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const [hh, mm] = (timeStr || '23:59').split(':').map(Number);
      return new Date(y, m - 1, d, hh, mm) < new Date();
    }

    function showToast(msg, duration = 2400) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((btn, i) => {
        btn.classList.toggle('active',
          (i === 0 && tab === 'upcoming') || (i === 1 && tab === 'past'));
      });
      renderEvents();
    }

    function loadEvents() {
      db.collection('events')
        .orderBy('date', 'asc')
        .orderBy('time', 'asc')
        .onSnapshot(snap => {
          allEvents = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderEvents();
        }, err => {
          console.error(err);
          document.getElementById('eventsList').innerHTML = `
            <div class="empty">
              <div class="empty-emoji">⚠️</div>
              <p class="empty-msg">Firebase 연결에 실패했어요.<br>
              설정을 확인하고 새로고침 해주세요.</p>
            </div>`;
        });
    }

    function renderEvents() {
      const filtered = allEvents.filter(e => {
        const past = isPast(e.date, e.time);
        return currentTab === 'upcoming' ? !past : past;
      });

      const list = document.getElementById('eventsList');

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-emoji">${currentTab === 'upcoming' ? '📅' : '📷'}</div>
            <p class="empty-msg">${currentTab === 'upcoming'
              ? '아직 예정된 모임이 없어요.<br>첫 번째 모임을 발제해보세요!'
              : '아직 지난 모임 기록이 없어요.'
            }</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(ev => {
        const attendees = ev.attendees || [];
        const maxCap    = ev.maxCapacity || null;
        const past      = isPast(ev.date, ev.time);
        const isFull    = maxCap && attendees.length >= maxCap;
        const ratio     = maxCap ? Math.min(attendees.length / maxCap, 1) : 0;

        const statusTag = past
          ? `<span class="status-tag past">완료</span>`
          : isFull
            ? `<span class="status-tag full">마감</span>`
            : `<span class="status-tag active">● 모집중</span>`;

        const joinBtn = past
          ? `<button class="btn-join" disabled>종료된 모임</button>`
          : isFull
            ? `<button class="btn-join" disabled>🔴 정원 마감</button>`
            : `<button class="btn-join" onclick="openJoin('${ev.id}')">✋ 참가 신청</button>`;

        const capSection = maxCap ? `
          <div class="capacity-section">
            <div class="capacity-label">
              <span>참가 현황</span>
              <strong>${attendees.length} / ${maxCap}명</strong>
            </div>
            <div class="capacity-bar">
              <div class="capacity-fill${isFull ? ' full' : ''}" style="width:${ratio*100}%"></div>
            </div>
          </div>` : attendees.length > 0 ? `
          <div class="capacity-label" style="margin-bottom:10px;">
            <span>참가자</span><strong>${attendees.length}명</strong>
          </div>` : '';

        const attSection = attendees.length > 0 ? `
          <div class="attendees-toggle" onclick="toggleAtt('att-${ev.id}', this)">
            <span class="pill">${attendees.length}</span>
            참가자 목록 보기 ▾
          </div>
          <div class="attendees-wrap" id="att-${ev.id}">
            ${attendees.map(a =>
              `<span class="attendee-chip">${esc(a.name)}<span style="color:var(--subtext);font-size:10px;margin-left:3px;">${esc(a.year)}</span></span>`
            ).join('')}
          </div>` : '';

        return `
          <div class="event-card">
            <div class="card-header">${statusTag}</div>
            <div class="event-title">${esc(ev.title)}</div>
            <div class="meta-list">
              <div class="meta-row">
                <span class="meta-icon">📅</span>
                <span class="meta-text">${fmtDate(ev.date, ev.time)}</span>
              </div>
              ${ev.location ? `
              <div class="meta-row">
                <span class="meta-icon">📍</span>
                <span class="meta-text">${esc(ev.location)}</span>
              </div>` : ''}
              <div class="meta-row">
                <span class="meta-icon">👤</span>
                <span class="meta-text">발제자 · ${esc(ev.proposer)}</span>
              </div>
            </div>
            ${ev.description ? `<div class="event-desc">${esc(ev.description)}</div>` : ''}
            ${capSection}
            ${attSection}
            <div class="card-actions">
              ${joinBtn}
              <button class="btn-del" onclick="openDel('${ev.id}')" title="삭제">🗑️</button>
            </div>
          </div>`;
      }).join('');
    }

    function toggleAtt(id, el) {
      const wrap = document.getElementById(id);
      const open = wrap.classList.toggle('open');
      el.innerHTML = el.innerHTML.replace(open ? '▾' : '▴', open ? '▴' : '▾');
    }

    function openAdd() {
      const today = new Date();
      const yyyy  = today.getFullYear();
      const mm    = String(today.getMonth() + 1).padStart(2, '0');
      const dd    = String(today.getDate()).padStart(2, '0');
      document.getElementById('fDate').value = `${yyyy}-${mm}-${dd}`;
      document.getElementById('addOverlay').classList.add('open');
    }
    function openJoin(id) {
      activeEvent = allEvents.find(e => e.id === id);
      if (!activeEvent) return;
      document.getElementById('joinTitle').textContent = `✋ ${activeEvent.title}`;
      document.getElementById('jName').value = '';
      document.getElementById('jYear').value = '';
      document.getElementById('joinOverlay').classList.add('open');
    }
    function openDel(id) {
      activeEvent = allEvents.find(e => e.id === id);
      if (!activeEvent) return;
      document.getElementById('delCode').value = '';
      document.getElementById('delOverlay').classList.add('open');
    }
    function closeOverlay(id) {
      document.getElementById(id).classList.remove('open');
    }
    function overlayClose(e, id) {
      if (e.target === document.getElementById(id)) closeOverlay(id);
    }

    async function submitAdd() {
      const title    = document.getElementById('fTitle').value.trim();
      const date     = document.getElementById('fDate').value;
      const time     = document.getElementById('fTime').value;
      const location = document.getElementById('fLocation').value.trim();
      const proposer = document.getElementById('fProposer').value.trim();
      const maxCap   = parseInt(document.getElementById('fMaxCap').value) || null;
      const desc     = document.getElementById('fDesc').value.trim();

      if (!title)    return showToast('⚠️ 모임 이름을 입력해주세요');
      if (!date)     return showToast('⚠️ 날짜를 선택해주세요');
      if (!proposer) return showToast('⚠️ 발제자 이름을 입력해주세요');

      const deleteCode = genCode();

      try {
        await db.collection('events').add({
          title,
          date,
          time:        time || null,
          location:    location || null,
          proposer,
          maxCapacity: maxCap,
          description: desc || null,
          deleteCode,
          attendees:   [],
          createdAt:   firebase.firestore.FieldValue.serverTimestamp()
        });

        ['fTitle','fDate','fTime','fLocation','fProposer','fMaxCap','fDesc']
          .forEach(id => document.getElementById(id).value = '');

        closeOverlay('addOverlay');
        document.getElementById('codeDisplay').textContent = deleteCode;
        document.getElementById('codeOverlay').classList.add('open');

      } catch (err) {
        console.error(err);
        showToast('❌ 등록 실패. Firebase 설정을 확인해주세요.');
      }
    }

    async function submitJoin() {
      const name = document.getElementById('jName').value.trim();
      const year = document.getElementById('jYear').value;
      if (!name) return showToast('⚠️ 이름을 입력해주세요');
      if (!year) return showToast('⚠️ 학년을 선택해주세요');

      const ev = activeEvent;
      if (!ev) return;

      const attendees = ev.attendees || [];
      if (attendees.some(a => a.name === name && a.year === year))
        return showToast('이미 신청되어 있어요!');
      if (ev.maxCapacity && attendees.length >= ev.maxCapacity)
        return showToast('정원이 가득 찼어요!');

      try {
        await db.collection('events').doc(ev.id).update({
          attendees: firebase.firestore.FieldValue.arrayUnion({ name, year })
        });
        closeOverlay('joinOverlay');
        showToast('✅ 참가 신청 완료!');
      } catch (err) {
        console.error(err);
        showToast('❌ 신청 실패. 다시 시도해주세요.');
      }
    }

    async function submitDelete() {
      const input = document.getElementById('delCode').value.trim().toUpperCase();
      const ev    = activeEvent;
      if (!ev) return;

      const validCode  = ev.deleteCode?.toUpperCase();
      const validAdmin = ADMIN_PW.toUpperCase();

      if (input !== validCode && input !== validAdmin)
        return showToast('❌ 코드가 맞지 않아요');

      try {
        await db.collection('events').doc(ev.id).delete();
        closeOverlay('delOverlay');
        showToast('🗑️ 모임이 삭제됐어요');
      } catch (err) {
        console.error(err);
        showToast('❌ 삭제 실패. 다시 시도해주세요.');
      }
    }

    loadEvents();
  </script>
</body>
</html>
